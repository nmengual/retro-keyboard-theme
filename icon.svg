<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#352F28"/>
      <stop offset="100%" stop-color="#2A2520"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Keyboard base plate -->
  <rect x="24" y="72" width="208" height="120" rx="12" fill="#1E1A16" stroke="#4A4236" stroke-width="1.5"/>

  <!-- Row 1 - Top -->
  <rect x="36" y="82" width="24" height="22" rx="4" fill="#E06060" filter="url(#shadow)"/>
  <rect x="64" y="82" width="24" height="22" rx="4" fill="#D4854A" filter="url(#shadow)"/>
  <rect x="92" y="82" width="24" height="22" rx="4" fill="#E8C060" filter="url(#shadow)"/>
  <rect x="120" y="82" width="24" height="22" rx="4" fill="#8BBF9C" filter="url(#shadow)"/>
  <rect x="148" y="82" width="24" height="22" rx="4" fill="#8AAEC4" filter="url(#shadow)"/>
  <rect x="176" y="82" width="24" height="22" rx="4" fill="#B89ED6" filter="url(#shadow)"/>
  <rect x="204" y="82" width="24" height="22" rx="4" fill="#88CCC0" filter="url(#shadow)"/>

  <!-- Row 2 - Middle -->
  <rect x="40" y="108" width="24" height="22" rx="4" fill="#F07878" filter="url(#shadow)"/>
  <rect x="68" y="108" width="24" height="22" rx="4" fill="#E8A860" filter="url(#shadow)"/>
  <rect x="96" y="108" width="24" height="22" rx="4" fill="#F0D478" filter="url(#shadow)"/>
  <rect x="124" y="108" width="24" height="22" rx="4" fill="#A8D4B4" filter="url(#shadow)"/>
  <rect x="152" y="108" width="24" height="22" rx="4" fill="#A8C8DC" filter="url(#shadow)"/>
  <rect x="180" y="108" width="24" height="22" rx="4" fill="#D0B8E8" filter="url(#shadow)"/>

  <!-- Row 3 - Bottom -->
  <rect x="44" y="134" width="24" height="22" rx="4" fill="#C0A8E0" filter="url(#shadow)"/>
  <rect x="72" y="134" width="24" height="22" rx="4" fill="#EDE4D6" filter="url(#shadow)"/>
  <rect x="100" y="134" width="80" height="22" rx="4" fill="#C8BFAE" filter="url(#shadow)"/>
  <rect x="184" y="134" width="24" height="22" rx="4" fill="#EDE4D6" filter="url(#shadow)"/>

  <!-- Row 4 - Space row accent -->
  <rect x="60" y="160" width="136" height="20" rx="4" fill="#352F28" stroke="#4A4236" stroke-width="1"/>

  <!-- Key legends (subtle) -->
  <text x="48" y="97" font-family="monospace" font-size="9" fill="#2A2520" text-anchor="middle" font-weight="bold">R</text>
  <text x="76" y="97" font-family="monospace" font-size="9" fill="#2A2520" text-anchor="middle" font-weight="bold">K</text>
  <text x="104" y="97" font-family="monospace" font-size="9" fill="#2A2520" text-anchor="middle" font-weight="bold">B</text>

  <!-- Title -->
  <text x="128" y="44" font-family="monospace" font-size="16" fill="#EDE4D6" text-anchor="middle" font-weight="bold" letter-spacing="1">RETRO</text>
  <text x="128" y="60" font-family="monospace" font-size="10" fill="#8A7E6E" text-anchor="middle" letter-spacing="2">KEYBOARD</text>

  <!-- Bottom accent line -->
  <rect x="60" y="200" width="136" height="3" rx="1.5" fill="#D4854A" opacity="0.6"/>
</svg>
